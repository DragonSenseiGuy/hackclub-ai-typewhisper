name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0). Will be created if missing.'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    env:
      PLUGIN_NAME: HackClubAIPlugin
      DEVELOPER_DIR: /Applications/Xcode_16.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          if [ -d "/Applications/Xcode_16.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.app
          else
            # Fall back to the newest available Xcode 16.x
            CANDIDATE=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -n1)
            if [ -z "$CANDIDATE" ]; then
              echo "No Xcode 16 installation found on runner" >&2
              ls /Applications | grep -i xcode || true
              exit 1
            fi
            sudo xcode-select -s "$CANDIDATE"
            echo "DEVELOPER_DIR=$CANDIDATE/Contents/Developer" >> "$GITHUB_ENV"
          fi

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build arm64
        run: swift build -c release --arch arm64

      - name: Build x86_64
        run: swift build -c release --arch x86_64

      - name: Locate built dylibs
        id: dylibs
        run: |
          ARM64=$(find .build -path "*apple-macosx/release/lib${PLUGIN_NAME}.dylib" -type f -not -path "*.dSYM/*" | grep arm64 | head -n1)
          X86=$(find .build -path "*apple-macosx/release/lib${PLUGIN_NAME}.dylib" -type f -not -path "*.dSYM/*" | grep x86_64 | head -n1)
          echo "arm64=$ARM64" >> "$GITHUB_OUTPUT"
          echo "x86=$X86" >> "$GITHUB_OUTPUT"
          file "$ARM64" "$X86"

      - name: Assemble universal .bundle
        run: |
          BUNDLE="${PLUGIN_NAME}.bundle"
          rm -rf "$BUNDLE"
          mkdir -p "$BUNDLE/Contents/MacOS" "$BUNDLE/Contents/Resources"
          lipo -create "${{ steps.dylibs.outputs.arm64 }}" "${{ steps.dylibs.outputs.x86 }}" \
               -output "$BUNDLE/Contents/MacOS/${PLUGIN_NAME}"
          cp Resources/manifest.json "$BUNDLE/Contents/Resources/manifest.json"
          # Patch CFBundleVersion from the tag for traceability.
          VERSION="${{ steps.tag.outputs.name }}"
          VERSION="${VERSION#v}"
          BUNDLE_ID=$(python3 -c "import json; print(json.load(open('Resources/manifest.json'))['id'])")
          PRINCIPAL=$(python3 -c "import json; print(json.load(open('Resources/manifest.json'))['principalClass'])")
          cat > "$BUNDLE/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key><string>en</string>
            <key>CFBundleExecutable</key><string>${PLUGIN_NAME}</string>
            <key>CFBundleIdentifier</key><string>${BUNDLE_ID}</string>
            <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
            <key>CFBundleName</key><string>${PLUGIN_NAME}</string>
            <key>CFBundlePackageType</key><string>BNDL</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>LSMinimumSystemVersion</key><string>14.0</string>
            <key>NSPrincipalClass</key><string>${PRINCIPAL}</string>
          </dict>
          </plist>
          PLIST
          echo "--- bundle layout ---"
          find "$BUNDLE" -maxdepth 4
          echo "--- universal check ---"
          lipo -info "$BUNDLE/Contents/MacOS/${PLUGIN_NAME}"
          file "$BUNDLE/Contents/MacOS/${PLUGIN_NAME}"
          # Sanity: must be a Mach-O dylib, not a dSYM companion.
          file "$BUNDLE/Contents/MacOS/${PLUGIN_NAME}" | grep -q "dynamically linked shared library" || {
            echo "Bundle binary is not a real dylib"; exit 1; }

      - name: Zip bundle
        run: |
          ZIP="${PLUGIN_NAME}-${{ steps.tag.outputs.name }}.zip"
          ditto -c -k --sequesterRsrc --keepParent "${PLUGIN_NAME}.bundle" "$ZIP"
          shasum -a 256 "$ZIP" | tee "${ZIP}.sha256"
          echo "ZIP=$ZIP" >> "$GITHUB_ENV"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: HackClubAIPlugin-bundle
          path: |
            ${{ env.ZIP }}
            ${{ env.ZIP }}.sha256

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            ${{ env.ZIP }}
            ${{ env.ZIP }}.sha256
